services:
  bot:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile

    image: trader-bot:latest
    container_name: trader-bot
    env_file:
      - .env

    volumes:
      - ./data:${DATA_DIR:-/opt/bot/data}

    healthcheck:
      test: ["CMD", "python", "-m", "classes.reporting.healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    restart: unless-stopped

    networks:
      - default
      - hub-shared

  ui:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile

    image: trader-bot-ui:latest
    container_name: trader-bot-ui
    env_file:
      - .env

    environment:
      UI_PROXY_TARGET: "http://bot:${DASHBOARD_PORT:-1002}"

    command: ["python", "-m", "classes.reporting.ui_proxy"]

    depends_on:
      - bot

    ports:
      - "${DASHBOARD_PORT:-1002}:${DASHBOARD_PORT:-1002}"

    restart: unless-stopped

    networks:
      - default
      - hub-shared

networks:
  hub-shared:
    name: services-hub-shared
    external: true
