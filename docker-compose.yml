services:
  bot:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile

    image: trader-bot:latest
    container_name: trader-bot
    env_file:
      - .env
    environment:
      DASHBOARD_ENABLED: "false"

    volumes:
      - ./data:${DATA_DIR:-/opt/bot/data}

    healthcheck:
      test: ["CMD", "python", "-m", "classes.reporting.healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile

    image: trader-bot-web:latest
    container_name: trader-bot-web
    env_file:
      - .env
    command: ["python", "start_web.py"]

    volumes:
      - ./data:${DATA_DIR:-/opt/bot/data}

    depends_on:
      - bot

    ports:
      - "${DASHBOARD_PORT:-1002}:1002"

    restart: unless-stopped
